<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ 학습지 자동 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --bg: #F5F0E8;
  --panel-bg: #FFFFFF;
  --primary: #E8450A;
  --primary-light: #FFE5D9;
  --secondary: #2BAE9F;
  --accent: #F5C518;
  --text: #1A1A1A;
  --text-muted: #777;
  --border: #DDD5C8;
  --dot-color: #2B2B2B;
  --dot-easy: #3366CC;
  --dot-hard: #CC3300;
  --track-fill: #F0F4FF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  min-height: 100vh;
}

/* ═══ CONTROL PANEL ═══ */
#panel {
  background: var(--panel-bg);
  border-bottom: 3px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 16px rgba(0,0,0,0.09);
}
.app-title {
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  white-space: nowrap;
}
.ctrl-sep { width: 1px; height: 32px; background: var(--border); }
.ctrl-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  white-space: nowrap;
}
.tab-row { display: flex; gap: 6px; }
.tab-btn {
  padding: 7px 16px;
  border: 2px solid var(--border);
  background: #fff;
  border-radius: 20px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  color: var(--text-muted);
  transition: all .18s;
  white-space: nowrap;
}
.tab-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(232,69,10,0.30);
}
/* Difficulty */
.diff-wrap {
  display: flex; align-items: center; gap: 8px;
  background: #FAF8F4;
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
}
.toggle-track {
  width: 52px; height: 26px;
  background: #CCC;
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  border: none; outline: none;
  transition: background .22s;
}
.toggle-track.on { background: var(--primary); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform .22s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle-track.on .toggle-thumb { transform: translateX(26px); }
.diff-text { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; }
/* Action buttons */
.btn-gen {
  background: var(--primary); color: #fff; border: none;
  border-radius: 20px; padding: 9px 22px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .18s;
  box-shadow: 0 2px 10px rgba(232,69,10,.28);
  white-space: nowrap;
}
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(232,69,10,.38); }
.btn-print {
  background: var(--secondary); color: #fff; border: none;
  border-radius: 20px; padding: 9px 20px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .18s;
  box-shadow: 0 2px 10px rgba(43,174,159,.28);
  white-space: nowrap;
}
.btn-print:hover { transform: translateY(-2px); }

/* ═══ WORKSHEET CONTAINER ═══ */
#ws-area {
  padding: 28px 24px;
  display: flex;
  justify-content: center;
}

/* A4 = 794 × 1123 px at 96dpi */
.worksheet {
  background: #fff;
  width: 794px;
  min-height: 1123px;
  box-shadow: 0 6px 40px rgba(0,0,0,.14);
  border-radius: 4px;
  padding: 40px 44px 36px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── header ── */
.ws-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 3px solid var(--primary);
}
.ws-head-left {}
.ws-title {
  font-family: 'Gaegu', cursive;
  font-size: 30px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.1;
}
.ws-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}
.ws-head-right {
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: right;
}
.ws-field {
  font-size: 13px;
  color: var(--text-muted);
  border-bottom: 1.5px solid var(--border);
  padding-bottom: 2px;
  min-width: 180px;
}
.ws-field span { color: var(--text); font-weight: 700; }

/* ── section label ── */
.sec-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; font-weight: 900;
  background: var(--primary); color: #fff;
  padding: 5px 16px; border-radius: 20px;
  margin-bottom: 14px;
}
.sec-label.green { background: #1A8C60; }

/* ─────────────────────────────────
   LINE DRAWING — grid of shapes
───────────────────────────────── */
.line-grid {
  display: grid;
  gap: 14px;
  margin-bottom: 0;
}
.line-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.line-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.line-card {
  background: #FAFBFF;
  border: 2px solid #DDE5F8;
  border-radius: 14px;
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.line-card-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--secondary);
  letter-spacing: 0.3px;
}
.line-card svg {
  width: 100%;
  display: block;
}

/* ─────────────────────────────────
   PICTURE COMPLETION — grid
───────────────────────────────── */
.pic-grid {
  display: grid;
  gap: 18px;
}
.pic-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.pic-grid.cols-1 { grid-template-columns: 1fr; }

.pic-card {
  background: linear-gradient(135deg, #FFFEF5 0%, #FFF9E0 100%);
  border: 2.5px solid #E6C800;
  border-radius: 18px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.pic-card-label {
  font-family: 'Gaegu', cursive;
  font-size: 18px;
  font-weight: 700;
  color: #7A5200;
}
.pic-card svg {
  display: block;
}
.pic-hint {
  font-size: 11px;
  color: #8B6914;
  background: #fff;
  border-radius: 8px;
  padding: 3px 10px;
  font-weight: 700;
}

/* divider */
.ws-divider {
  border: none;
  border-top: 2px dashed var(--border);
  margin: 20px 0;
}

/* ═══ PRINT ═══ */
@media print {
  body { background: #fff; }
  #panel { display: none !important; }
  #ws-area { padding: 0; }
  .worksheet {
    box-shadow: none;
    border-radius: 0;
    width: 100%;
    min-height: auto;
    padding: 20px 24px;
  }
}
</style>
</head>
<body>

<!-- ═══════════ CONTROL PANEL ═══════════ -->
<div id="panel">
  <div class="app-title">✏️ 학습지 생성기</div>
  <div class="ctrl-sep"></div>

  <div class="ctrl-label">유형</div>
  <div class="tab-row">
    <button class="tab-btn active" id="tab-line"    onclick="setTab('line')">🖊️ 선 긋기</button>
    <button class="tab-btn"        id="tab-picture" onclick="setTab('picture')">🎨 그림 완성</button>
    <button class="tab-btn"        id="tab-both"    onclick="setTab('both')">📄 통합형</button>
  </div>

  <div class="ctrl-sep"></div>
  <div class="ctrl-label">난이도</div>
  <div class="diff-wrap">
    <span style="font-size:16px;">😊</span>
    <button class="toggle-track" id="diff-toggle" onclick="toggleDiff()">
      <div class="toggle-thumb"></div>
    </button>
    <span style="font-size:16px;">🌀</span>
    <span class="diff-text" id="diff-text">직선만</span>
  </div>

  <div style="margin-left:auto;display:flex;gap:10px;">
    <button class="btn-gen" onclick="generate()">🔀 새로 생성</button>
    <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
  </div>
</div>

<!-- ═══════════ WORKSHEET ═══════════ -->
<div id="ws-area">
  <div class="worksheet" id="ws"></div>
</div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const S = { tab: 'line', hard: false };

/* ══════════════════════════════════════════
   UTILITY
══════════════════════════════════════════ */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }

/* ══════════════════════════════════════════
   LINE SHAPES POOL
   Each item:
     label  — 카드에 표시할 이름
     easy   — hardMode=false 일 때 SVG d 생성 함수
     hard   — hardMode=true  일 때 SVG d 생성 함수
   SVG viewBox = "0 0 280 100"
   Path is the DOTTED guide the student traces.
   We also add start/end markers.
══════════════════════════════════════════ */

/* helper: dashed path SVG (full card) */
function lineSVG(d, label, color, extraElements = '') {
  return `
<svg viewBox="0 0 280 110" xmlns="http://www.w3.org/2000/svg">
  <!-- light track -->
  <path d="${d}" fill="none" stroke="#E8EEF8" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- dotted guide -->
  <path d="${d}" fill="none" stroke="${color}" stroke-width="3.5"
    stroke-dasharray="9,7" stroke-linecap="round" stroke-linejoin="round"/>
  ${extraElements}
</svg>`;
}

/* start / end dot helpers */
function startDot(x, y, c='#2BAE9F') {
  return `<circle cx="${x}" cy="${y}" r="7" fill="${c}" stroke="#fff" stroke-width="2"/>
          <text x="${x}" y="${y+4}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif">출발</text>`;
}
function endDot(x, y, c='#E8450A') {
  return `<circle cx="${x}" cy="${y}" r="7" fill="${c}" stroke="#fff" stroke-width="2"/>
          <text x="${x}" y="${y+4}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif">도착</text>`;
}

/* ── LINE SHAPE DEFINITIONS ── */
/* Each shape = { label, buildSVG(hard) } */
const LINE_SHAPES = [
  {
    label: '➡ 가로 직선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 55 L 260 55'  // straight even in hard (baseline)
        : 'M 20 55 L 260 55';
      return lineSVG(d, this.label, '#3366CC',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '↘ 대각선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 20 L 260 90'
        : 'M 20 30 L 260 80';
      return lineSVG(d, this.label, '#3366CC',
        startDot(20, hard?20:30) + endDot(260, hard?90:80));
    }
  },
  {
    label: '〜 완만한 S자 곡선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 55 C 80 10, 140 100, 200 10, C 230 0 255 30 260 55'
        : 'M 20 55 C 80 20, 200 90, 260 55';
      return lineSVG(d, this.label, '#9B59B6',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '🌊 파도 곡선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 55 Q 60 10 100 55 Q 140 100 180 55 Q 220 10 260 55'
        : 'M 20 55 Q 80 15 140 55 Q 200 95 260 55';
      return lineSVG(d, this.label, '#2BAE9F',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '⚡ 지그재그',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 85 L 65 20 L 110 85 L 155 20 L 200 85 L 260 20'
        : 'M 20 80 L 90 20 L 170 80 L 260 20';
      return lineSVG(d, this.label, '#E67E22',
        startDot(20, hard?85:80) + endDot(260, hard?20:20));
    }
  },
  {
    label: '🔁 루프 곡선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 55 C 40 10 80 10 80 55 C 80 100 120 100 140 55 C 160 10 200 10 260 55'
        : 'M 20 55 C 50 10 110 10 140 55 C 170 100 230 100 260 55';
      return lineSVG(d, this.label, '#C0392B',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '📐 꺾임선 (1회)',
    buildSVG(hard) {
      const mx = 140 + (Math.random()*40-20)|0;
      const my = hard ? (15 + Math.random()*25)|0 : (20 + Math.random()*20)|0;
      const d = `M 20 55 L ${mx} ${my} L 260 55`;
      return lineSVG(d, this.label, '#3366CC',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '〰 두 번 꺾임',
    buildSVG(hard) {
      const y1 = hard ? 15 : 20;
      const y2 = hard ? 90 : 80;
      const d = `M 20 55 L 90 ${y1} L 190 ${y2} L 260 55`;
      return lineSVG(d, this.label, '#8E44AD',
        startDot(20,55) + endDot(260,55));
    }
  },
  {
    label: '🌀 나선형',
    buildSVG(hard) {
      // simplified spiral-like arc
      const d = hard
        ? 'M 140 55 m -70 0 a 70,70 0 1,1 140 0 a 40,40 0 1,0 -80 0 a 15,15 0 1,1 30 0'
        : 'M 140 55 m -60 0 a 60,60 0 1,1 120 0 a 30,30 0 1,0 -60 0';
      return lineSVG(d, this.label, '#16A085', '');
    }
  },
  {
    label: '🏔 산 모양',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 85 L 80 20 L 140 60 L 200 15 L 260 85'
        : 'M 20 85 L 90 20 L 180 65 L 260 85';
      return lineSVG(d, this.label, '#27AE60',
        startDot(20,85) + endDot(260,85));
    }
  },
  {
    label: '🌈 아치형 곡선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 85 Q 80 5 140 85 Q 200 5 260 85'
        : 'M 20 85 Q 140 5 260 85';
      return lineSVG(d, this.label, '#E74C3C',
        startDot(20,85) + endDot(260,85));
    }
  },
  {
    label: '↩ U자 곡선',
    buildSVG(hard) {
      const d = hard
        ? 'M 20 20 Q 20 100 140 100 Q 260 100 260 20'
        : 'M 40 20 Q 40 90 140 90 Q 240 90 240 20';
      return lineSVG(d, this.label, '#2980B9',
        startDot(20,20) + endDot(260,20));
    }
  },
];

/* ══════════════════════════════════════════
   PICTURE COMPLETION POOL
   Each picture: { label, hint, buildSVG() }
   buildSVG() returns full SVG string (360×360)
   ALL lines are DOTTED — student traces everything
   Stroke: thick dashed #2B2B2B for clarity
══════════════════════════════════════════ */

const DS = 'stroke="#2B2B2B" stroke-width="4" stroke-dasharray="11,8" stroke-linecap="round" stroke-linejoin="round" fill="none"';
const DSC = (color) => `stroke="${color}" stroke-width="4" stroke-dasharray="11,8" stroke-linecap="round" stroke-linejoin="round" fill="none"`;

const PICTURES = [
  {
    label: '🌟 별',
    hint: '별 모양을 따라 그려요!',
    buildSVG() {
      return `<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
        <!-- star outline fully dotted -->
        <polygon points="180,30 210,130 320,130 232,192 262,295 180,234 98,295 128,192 40,130 150,130"
          ${DS} stroke-width="5"/>
        <!-- center sparkle -->
        <circle cx="180" cy="180" r="18" ${DSC('#E6B800')} stroke-dasharray="6,5"/>
        <!-- 4 sparkles around -->
        <line x1="180" y1="60" x2="180" y2="80" ${DSC('#E6B800')} stroke-dasharray="4,4"/>
        <line x1="300" y1="180" x2="280" y2="180" ${DSC('#E6B800')} stroke-dasharray="4,4"/>
        <line x1="180" y1="300" x2="180" y2="280" ${DSC('#E6B800')} stroke-dasharray="4,4"/>
        <line x1="60" y1="180" x2="80" y2="180" ${DSC('#E6B800')} stroke-dasharray="4,4"/>
      </svg>`;
    }
  },
  {
    label: '🦋 나비',
    hint: '나비를 따라 그려요!',
    buildSVG() {
      return `<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
        <!-- left upper wing -->
        <ellipse cx="100" cy="130" rx="90" ry="65" transform="rotate(-20 100 130)" ${DSC('#C0005A')} stroke-width="5"/>
        <!-- left lower wing -->
        <ellipse cx="105" cy="235" rx="75" ry="52" transform="rotate(20 105 235)" ${DSC('#8B0040')} stroke-width="4"/>
        <!-- right upper wing -->
        <ellipse cx="260" cy="130" rx="90" ry="65" transform="rotate(20 260 130)" ${DSC('#C0005A')} stroke-width="5"/>
        <!-- right lower wing -->
        <ellipse cx="255" cy="235" rx="75" ry="52" transform="rotate(-20 255 235)" ${DSC('#8B0040')} stroke-width="4"/>
        <!-- body -->
        <ellipse cx="180" cy="180" rx="12" ry="58" ${DS} stroke-width="4"/>
        <!-- head -->
        <circle cx="180" cy="110" r="16" ${DS} stroke-width="4"/>
        <!-- antennae -->
        <path d="M174 96 Q155 65 148 50" ${DS} stroke-width="3" stroke-dasharray="6,6"/>
        <path d="M186 96 Q205 65 212 50" ${DS} stroke-width="3" stroke-dasharray="6,6"/>
        <circle cx="148" cy="48" r="6" ${DS} stroke-dasharray="5,5"/>
        <circle cx="212" cy="48" r="6" ${DS} stroke-dasharray="5,5"/>
        <!-- wing patterns -->
        <circle cx="108" cy="125" r="20" ${DSC('#E6B800')} stroke-dasharray="6,5"/>
        <circle cx="252" cy="125" r="20" ${DSC('#E6B800')} stroke-dasharray="6,5"/>
      </svg>`;
    }
  },
  {
    label: '🏠 집',
    hint: '집을 따라 그려요!',
    buildSVG() {
      return `<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
        <!-- roof -->
        <polygon points="50,200 180,60 310,200" ${DS} stroke-width="5"/>
        <!-- chimney -->
        <rect x="230" y="90" width="35" height="65" rx="3" ${DS} stroke-width="4"/>
        <!-- smoke puffs -->
        <circle cx="247" cy="75" r="12" ${DS} stroke-dasharray="5,5"/>
        <circle cx="262" cy="60" r="9"  ${DS} stroke-dasharray="5,5"/>
        <!-- walls -->
        <rect x="66" y="198" width="228" height="140" rx="4" ${DS} stroke-width="5"/>
        <!-- door -->
        <rect x="151" y="258" width="58" height="80" rx="6" ${DS} stroke-width="4"/>
        <circle cx="200" cy="300" r="5" ${DS} stroke-dasharray="4,3"/>
        <!-- left window -->
        <rect x="82" y="220" width="58" height="52" rx="4" ${DS} stroke-width="4"/>
        <line x1="111" y1="220" x2="111" y2="272" ${DS} stroke-width="2.5" stroke-dasharray="5,5"/>
        <line x1="82"  y1="246" x2="140" y2="246" ${DS} stroke-width="2.5" stroke-dasharray="5,5"/>
        <!-- right window -->
        <rect x="220" y="220" width="58" height="52" rx="4" ${DS} stroke-width="4"/>
        <line x1="249" y1="220" x2="249" y2="272" ${DS} stroke-width="2.5" stroke-dasharray="5,5"/>
        <line x1="220" y1="246" x2="278" y2="246" ${DS} stroke-width="2.5" stroke-dasharray="5,5"/>
        <!-- path -->
        <path d="M152 338 Q140 345 120 348 L120 358 L240 358 L240 348 Q220 345 208 338" ${DS} stroke-width="3" stroke-dasharray="6,5"/>
      </svg>`;
    }
  },
  {
    label: '🐟 물고기',
    hint: '물고기를 따라 그려요!',
    buildSVG() {
      return `<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
        <!-- body -->
        <ellipse cx="165" cy="180" rx="130" ry="85" ${DS} stroke-width="5"/>
        <!-- tail fin -->
        <path d="M295 180 L340 120 L340 240 Z" ${DS} stroke-width="5"/>
        <!-- top fin -->
        <path d="M130 96 Q160 50 200 96" ${DS} stroke-width="4"/>
        <!-- bottom fin -->
        <path d="M130 264 Q155 305 185 264" ${DS} stroke-width="4"/>
        <!-- eye -->
        <circle cx="75" cy="165" r="22" ${DS} stroke-width="4"/>
        <circle cx="70" cy="160" r="10" ${DS} stroke-dasharray="5,4"/>
        <!-- mouth -->
        <path d="M45 178 Q52 190 45 200" ${DS} stroke-width="3"/>

/* ══════════════════════════════════════════
   RENDER FUNCTIONS
══════════════════════════════════════════ */

function renderLineSection(hard, count) {
  const shapes = pick(LINE_SHAPES, count);
  const cols = count <= 2 ? 1 : count <= 4 ? 2 : count <= 6 ? 2 : 3;
  // For 6 shapes → 2 cols × 3 rows
  let cards = shapes.map(sh => `
    <div class="line-card">
      <div class="line-card-label">${sh.label}</div>
      ${sh.buildSVG(hard)}
    </div>`).join('');

  return `
    <div class="sec-label">✏️ 선을 따라 그어 보세요</div>
    <div class="line-grid cols-${cols <= 2 ? (count<=2?'1':'2') : '3'}">${cards}</div>`;
}

function renderPictureSection(count) {
  const pics = pick(PICTURES, count);
  // For 2 items → 2 cols. For 1 item → 1 col (large)
  const cols = count === 1 ? 1 : 2;
  let cards = pics.map(p => {
    const svgW = count === 1 ? 560 : 290;
    const picSvg = p.buildSVG();
    // Override viewBox size rendering
    const scaled = picSvg.replace('<svg viewBox="0 0 360 360"', `<svg viewBox="0 0 360 360" width="${svgW}" height="${svgW}"`);
    return `
    <div class="pic-card">
      <div class="pic-card-label">${p.label} 따라 그리기</div>
      ${scaled}
      <div class="pic-hint">✏️ 점선을 따라 모두 그려요! — ${p.hint}</div>
    </div>`;
  }).join('');

  return `
    <div class="sec-label green">🎨 그림을 따라 그려 보세요</div>
    <div class="pic-grid cols-${cols}">${cards}</div>`;
}

/* ══════════════════════════════════════════
   MAIN GENERATE
══════════════════════════════════════════ */
function generate() {
  const ws = document.getElementById('ws');
  const today = new Date();
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;

  const titles = {
    line:    { t:'선 긋기 학습지',         sub:'✨ 점선을 따라 선을 그어 보아요!' },
    picture: { t:'그림 완성 학습지',       sub:'🎨 점선을 따라 그림을 완성해요!' },
    both:    { t:'선 긋기 + 그림 완성',    sub:'✏️ 선도 긋고 그림도 그려요!' },
  };
  const { t, sub } = titles[S.tab];

  const diffBadge = S.hard
    ? `<span style="display:inline-block;background:#CC3300;color:#fff;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700;margin-top:6px;">🌀 곡선·꺾임 포함</span>`
    : `<span style="display:inline-block;background:#1A8C60;color:#fff;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700;margin-top:6px;">😊 직선 위주</span>`;

  let body = '';
  if (S.tab === 'line') {
    body = renderLineSection(S.hard, 6);
  } else if (S.tab === 'picture') {
    body = renderPictureSection(2);
  } else {
    // both: 3 line shapes + 2 pictures
    body = renderLineSection(S.hard, 3);
    body += `<hr class="ws-divider">`;
    body += renderPictureSection(2);
  }

  ws.innerHTML = `
    <div class="ws-head">
      <div class="ws-head-left">
        <div class="ws-title">${t}</div>
        <div class="ws-sub">${sub}</div>
        ${diffBadge}
      </div>
      <div class="ws-head-right">
        <div class="ws-field">이름&nbsp;&nbsp;<span style="display:inline-block;width:100px;border-bottom:1.5px solid #ccc;">&nbsp;</span></div>
        <div class="ws-field">날짜&nbsp;&nbsp;<span>${dateStr}</span></div>
        <div class="ws-field">선생님 확인&nbsp;&nbsp;<span style="display:inline-block;width:60px;border-bottom:1.5px solid #ccc;">&nbsp;</span></div>
      </div>
    </div>
    ${body}
  `;
}

/* ══════════════════════════════════════════
   UI CONTROLS
══════════════════════════════════════════ */
function setTab(tab) {
  S.tab = tab;
  ['line','picture','both'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === tab);
  });
  generate();
}

function toggleDiff() {
  S.hard = !S.hard;
  const btn = document.getElementById('diff-toggle');
  btn.classList.toggle('on', S.hard);
  document.getElementById('diff-text').textContent = S.hard ? '곡선/꺾임 포함' : '직선만';
  generate();
}

/* ══════════════════════════════════════════
   INIT

generate();
